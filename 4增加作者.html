<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XX模拟器</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
    <script>
        if (typeof htmlToImage === 'undefined') {
            document.write('<script src="https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.min.js"><\/script>');
        }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ===== CSS 变量 ===== */
        :root {
            --title-size: 4rem; --title-color: #f4e4c1;
            --label-size: 0.8rem; --label-color: #d4a574;
            --situation-size: 1.1rem; --situation-color: #f0e6d3;
            --choice-size: 1.1rem; --choice-color: #f0e6d3;
            --ending-label-size: 1.8rem; --ending-label-color: #d4a574;
            --ending-text-size: 1.15rem; --ending-text-color: #f0e6d3;
            --number-size: 1.3rem; --number-color: #d4a574;
            --seal-size: 1rem; --seal-color: rgba(180, 50, 50, 0.6);
            --record-size: 0.95rem; --record-color: #e8dcc8;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            color: #e0e0e0;
        }

        .header {
            text-align: center;
            padding: 15px 20px 10px;
            background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
        }

        .title-input {
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 900;
            font-size: 3rem;
            color: #f4e4c1;
            background: transparent;
            border: none;
            text-align: center;
            width: 80%;
            max-width: 600px;
            padding: 10px 20px;
            letter-spacing: 0.15em;
            outline: none;
        }

        .title-hint {
            color: rgba(212, 165, 116, 0.5);
            font-size: 0.85rem;
            margin-top: 6px;
            letter-spacing: 0.1em;
        }
        .author-input {
            font-family: 'Noto Serif SC', 'Source Han Serif SC', '思源宋体', 'SimSun', '宋体', serif;
            font-size: var(--choice-size);
            color: var(--choice-color);
            background: transparent;
            border: none;
            text-align: center;
            width: 60%;
            max-width: 400px;
            padding: 6px 20px;
            letter-spacing: 0.1em;
            outline: none;
            margin-top: 4px;
            opacity: 0.85;
        }
        .author-input::placeholder {
            color: rgba(240, 230, 211, 0.3);
            font-size: 0.85em;
        }


        .main-container {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px 20px;
            gap: 35px;
            align-items: flex-start;
        }

        .editor-panel {
            flex: 0 0 420px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: calc(100vh - 90px);
            position: sticky;
            top: 10px;
            overflow-y: auto;
        }

        .panel-section {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 16px;
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        /* 样式面板：减小高度 */
        .panel-section.style-panel {
            max-height: 150px;
            overflow-y: auto;
            padding-right: 8px;
        }
        .panel-section.style-panel::-webkit-scrollbar { width: 5px; }
        .panel-section.style-panel::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 3px; }
        .panel-section.style-panel::-webkit-scrollbar-thumb { background: rgba(212, 165, 116, 0.3); border-radius: 3px; }

        .panel-title {
            font-size: 1rem;
            font-weight: 700;
            color: #d4a574;
            margin-bottom: 10px;
            padding-left: 12px;
            border-left: 3px solid #d4a574;
            letter-spacing: 0.1em;
        }

        .style-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 10px;
        }
        .style-row label {
            font-size: 0.8rem;
            color: rgba(212, 165, 116, 0.8);
            flex-shrink: 0;
        }
        .style-row input[type="range"] {
            flex: 1;
            accent-color: #d4a574;
        }
        .style-row input[type="color"] {
            width: 36px;
            height: 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: transparent;
        }

        .upload-area {
            border: 2px dashed rgba(212, 165, 116, 0.3);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .upload-area:hover {
            border-color: rgba(212, 165, 116, 0.6);
            background: rgba(212, 165, 116, 0.05);
        }
        .upload-area.has-image {
            border-style: solid;
            border-color: rgba(212, 165, 116, 0.4);
            padding: 0;
            height: 100px;
        }
        .upload-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            display: none;
        }
        .upload-area.has-image .upload-preview { display: block; }
        .upload-area.has-image .upload-text { display: none; }

        .upload-text {
            color: rgba(212, 165, 116, 0.7);
            font-size: 0.9rem;
            pointer-events: none;
        }
        .upload-text .icon {
            font-size: 1.6rem;
            margin-bottom: 4px;
            display: block;
        }

        #bgInput { display: none; }

        /* ===== 历史节点区域：加大高度，内部结构重组 ===== */
        .nodes-section {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            padding: 16px;
            max-height: 650px;        /* 加大高度 */
        }

        /* 节点列表：单独滚动 */
        .nodes-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;         /* 列表超出时内部滚动 */
            padding-right: 6px;
            flex: 1;
            min-height: 0;
            margin-bottom: 12px;      /* 和按钮间距 */
        }
        .nodes-list::-webkit-scrollbar { width: 6px; }
        .nodes-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 3px; }
        .nodes-list::-webkit-scrollbar-thumb { background: rgba(212, 165, 116, 0.35); border-radius: 3px; }
        .nodes-list::-webkit-scrollbar-thumb:hover { background: rgba(212, 165, 116, 0.55); }

        .node-card {
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
        }
        .node-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .node-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: rgba(0,0,0,0.25);
        }
        .node-badge {
            font-size: 0.8rem;
            font-weight: 700;
            color: #d4a574;
            letter-spacing: 0.05em;
        }
        .node-delete {
            background: rgba(220, 60, 60, 0.6);
            color: #fff;
            border: none;
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
            font-family: 'Noto Sans SC', sans-serif;
        }
        .node-delete:hover { background: rgba(220, 60, 60, 0.85); }

        .situation-box {
            background: rgba(210, 180, 140, 0.22);
            backdrop-filter: blur(8px);
            padding: 14px;
        }
        .situation-label {
            font-family: 'LXGW WenKai', '方正楷体', 'FZKTJW', 'KaiTi', '楷体', cursive;
            font-weight: 700;
            font-size: 1rem;
            color: #d4b896;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .situation-label::before {
            content: "\25C6";
            color: #c9a86c;
            font-size: 0.7rem;
        }

        /* 情境文本框：内部滚动 */
        .situation-textarea {
            font-family: 'LXGW WenKai', '方正楷体', 'FZKTJW', 'KaiTi', '楷体', cursive;
            font-size: 0.95rem;
            line-height: 1.7;
            color: #f0e6d3;
            background: rgba(0,0,0,0.15);
            border: 1px solid rgba(180, 140, 100, 0.5);
            border-radius: 8px;
            padding: 12px;
            width: 100%;
            min-height: 80px;
            max-height: 120px;
            overflow-y: auto;
            resize: vertical;
            outline: none;
            display: block;
        }
        .situation-textarea:focus {
            border-color: rgba(212, 165, 116, 0.6);
            box-shadow: 0 0 12px rgba(212, 165, 116, 0.08);
        }
        .situation-textarea::placeholder { color: rgba(240, 230, 211, 0.35); }

        .choice-box {
            background: rgba(160, 110, 70, 0.22);
            backdrop-filter: blur(8px);
            padding: 14px;
        }
        .choice-label {
            font-family: 'Noto Serif SC', 'Source Han Serif SC', '思源宋体', 'SimSun', '宋体', serif;
            font-weight: 700;
            font-size: 1rem;
            color: #d4b896;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .choice-label::before {
            content: "\25B8";
            color: #b0784a;
            font-size: 0.8rem;
        }

        /* 选择文本框：内部滚动 */
        .choice-textarea {
            font-family: 'Noto Serif SC', 'Source Han Serif SC', '思源宋体', 'SimSun', '宋体', serif;
            font-size: 0.95rem;
            line-height: 1.7;
            color: #f0e6d3;
            background: rgba(0,0,0,0.15);
            border: 1px solid rgba(130, 85, 50, 0.5);
            border-radius: 8px;
            padding: 12px;
            width: 100%;
            min-height: 60px;
            max-height: 100px;
            overflow-y: auto;
            resize: vertical;
            outline: none;
            display: block;
        }
        .choice-textarea:focus {
            border-color: rgba(160, 110, 70, 0.6);
            box-shadow: 0 0 12px rgba(160, 110, 70, 0.08);
        }
        .choice-textarea::placeholder { color: rgba(240, 230, 211, 0.35); }

        .ending-textarea {
            font-family: 'LXGW WenKai', '方正楷体', 'FZKTJW', 'KaiTi', '楷体', cursive;
            font-size: 0.95rem;
            line-height: 1.7;
            color: #f0e6d3;
            background: rgba(0,0,0,0.15);
            border: 1px solid rgba(180, 140, 100, 0.5);
            border-radius: 8px;
            padding: 12px;
            width: 100%;
            min-height: 80px;
            max-height: 120px;
            overflow-y: auto;
            resize: vertical;
            outline: none;
            display: block;
        }
        .ending-textarea:focus {
            border-color: rgba(212, 165, 116, 0.6);
            box-shadow: 0 0 12px rgba(212, 165, 116, 0.08);
        }
        .ending-textarea::placeholder { color: rgba(240, 230, 211, 0.35); }

        .record-toggle-box {
            background: rgba(0,0,0,0.15);
            padding: 8px 16px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        .record-toggle-btn {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.8rem;
            color: rgba(212, 165, 116, 0.7);
            background: transparent;
            border: 1px dashed rgba(212, 165, 116, 0.3);
            padding: 4px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.05em;
        }
        .record-toggle-btn:hover {
            color: #d4a574;
            border-color: rgba(212, 165, 116, 0.6);
            background: rgba(212, 165, 116, 0.08);
        }
        .record-toggle-btn.active {
            color: #d4a574;
            border-style: solid;
            border-color: rgba(212, 165, 116, 0.5);
            background: rgba(212, 165, 116, 0.12);
        }
        .record-box {
            background: rgba(160, 110, 70, 0.08);
            backdrop-filter: blur(8px);
            padding: 10px 14px;
            display: none;
        }
        .record-label {
            font-family: 'GenRyuMin TW', 'Noto Serif SC', 'Source Han Serif SC', '思源宋体', 'SimSun', '宋体', serif;
            font-weight: 600;
            font-size: 0.85rem;
            color: rgba(201, 168, 108, 0.75);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .record-label::before {
            content: "\25B8";
            color: rgba(138, 106, 74, 0.6);
            font-size: 0.65rem;
        }
        .record-textarea {
            font-family: 'GenRyuMin TW', 'Noto Serif SC', 'Source Han Serif SC', '思源宋体', 'SimSun', '宋体', serif;
            font-size: 0.9rem;
            line-height: 1.7;
            color: #e8dcc8;
            background: rgba(0,0,0,0.1);
            border: 1px solid rgba(140, 110, 80, 0.35);
            border-radius: 8px;
            padding: 10px 12px;
            width: 100%;
            min-height: 50px;
            max-height: 90px;
            overflow-y: auto;
            resize: vertical;
            outline: none;
            display: block;
        }
        .record-textarea:focus {
            border-color: rgba(140, 110, 80, 0.7);
            box-shadow: 0 0 12px rgba(140, 110, 80, 0.08);
        }
        .record-textarea::placeholder { color: rgba(240, 230, 211, 0.35); }


        /* 添加按钮：固定在节点区底部 */
        .add-node-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, rgba(212,165,116,0.2), rgba(160,110,70,0.2));
            border: 2px dashed rgba(212, 165, 116, 0.25);
            border-radius: 14px;
            color: #d4a574;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.1em;
            flex-shrink: 0;           /* 不压缩 */
            margin-top: auto;         /* 推到底部 */
        }
        .add-node-btn:hover {
            background: linear-gradient(135deg, rgba(212,165,116,0.35), rgba(160,110,70,0.35));
            border-color: rgba(212, 165, 116, 0.5);
            transform: scale(1.01);
        }

        .preview-section {
            flex: 1;
            min-width: 0;
        }

        .preview-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .preview-label {
            font-size: 1rem;
            font-weight: 700;
            color: #d4a574;
            padding-left: 12px;
            border-left: 3px solid #d4a574;
            letter-spacing: 0.1em;
        }
        .download-btn {
            background: linear-gradient(135deg, #8b4513, #a0522d);
            color: #f4e4c1;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.3);
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.4);
        }
        .download-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .scroll-container {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        .scroll-bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .scroll-bg-default {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(135deg, #1a1510 0%, #2d2418 50%, #1a1510 100%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4a574' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .scroll-bg-default-text {
            color: rgba(212, 165, 116, 0.25);
            font-size: 1.1rem;
            letter-spacing: 0.2em;
        }

        .scroll-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 21, 16, 0.45);
            z-index: 2;
        }

        .scroll-content {
            position: relative;
            z-index: 3;
            padding: 50px 45px;
        }

        .scroll-container.export-mode .scroll-content {
            background: rgba(26, 21, 16, 0.45);
        }

        .scroll-title {
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 900;
            font-size: var(--title-size);
            color: var(--title-color);
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 0.25em;
            text-shadow: 0 3px 15px rgba(0,0,0,0.5);
        }
        .scroll-author {
            font-family: 'Noto Serif SC', 'Source Han Serif SC', '思源宋体', 'SimSun', '宋体', serif;
            font-size: var(--choice-size);
            color: var(--choice-color);
            text-align: center;
            margin-bottom: 24px;
            letter-spacing: 0.15em;
            opacity: 0.75;
        }


        .scroll-flow {
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .scroll-node { animation: nodeAppear 0.5s ease; }
        @keyframes nodeAppear {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .scroll-node-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .scroll-node-number {
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 900;
            font-size: var(--number-size);
            color: var(--number-color);
            width: 42px;
            height: 42px;
            background: rgba(212, 165, 116, 0.15);
            border: 2px solid rgba(212, 165, 116, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .scroll-node-divider {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(212, 165, 116, 0.3), transparent);
        }

        .scroll-node-card {
            background: rgba(30, 25, 20, 0.7);
            border: 1px solid rgba(212, 165, 116, 0.12);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.35);
        }

        .scroll-card-label {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: var(--label-size);
            font-weight: 700;
            color: var(--label-color);
            margin-bottom: 8px;
            letter-spacing: 0.1em;
            opacity: 0.9;
        }

        .scroll-situation {
            font-family: 'LXGW WenKai', '方正楷体', 'FZKTJW', 'KaiTi', '楷体', cursive;
            font-size: var(--situation-size);
            line-height: 1.9;
            color: var(--situation-color);
            padding: 20px 22px;
            background: rgba(210, 180, 140, 0.22);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            border-left: 4px solid #c9a86c;
        }

        .scroll-choice {
            font-family: 'Noto Serif SC', 'Source Han Serif SC', '思源宋体', 'SimSun', '宋体', serif;
            font-size: var(--choice-size);
            line-height: 1.9;
            color: var(--choice-color);
            padding: 20px 22px;
            background: rgba(160, 110, 70, 0.22);
            border-left: 4px solid #b0784a;
        }

        .scroll-ending {
            margin-top: 40px;
            padding: 30px 22px;
            background: transparent;
            position: relative;
        }
        .scroll-ending::before {
            content: '';
            position: absolute;
            top: 0;
            left: 22px;
            right: 22px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 165, 116, 0.4), transparent);
        }
        .scroll-ending-label {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: var(--ending-label-size);
            font-weight: 700;
            color: var(--ending-label-color);
            margin-bottom: 16px;
            letter-spacing: 0.15em;
            text-align: center;
        }
        .scroll-ending-text {
            font-family: 'LXGW WenKai', '方正楷体', 'FZKTJW', 'KaiTi', '楷体', cursive;
            font-size: var(--ending-text-size);
            line-height: 2;
            color: var(--ending-text-color);
            text-align: center;
        }

        .scroll-empty {
            text-align: center;
            color: rgba(244, 228, 193, 0.25);
            padding: 100px 20px;
            font-size: 1.1rem;
            letter-spacing: 0.15em;
        }

        .scroll-seal {
            position: absolute;
            bottom: 35px;
            right: 35px;
            width: 75px;
            height: 75px;
            border: 3px solid rgba(180, 50, 50, 0.5);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(-12deg);
            opacity: 0.55;
            z-index: 4;
            pointer-events: none;
        }

        .scroll-record {
            font-family: 'GenRyuMin TW', 'Noto Serif SC', 'Source Han Serif SC', '思源宋体', 'SimSun', '宋体', serif;
            font-size: var(--record-size);
            line-height: 1.8;
            color: var(--record-color);
            padding: 8px 22px 10px 30px;
            background: rgba(160, 110, 70, 0.08);
            border-top: 1px solid rgba(160, 110, 70, 0.12);
        }

        .scroll-seal span {
            font-family: 'LXGW WenKai', '方正楷体', 'FZKTJW', 'KaiTi', '楷体', cursive;
            font-size: var(--seal-size);
            color: var(--seal-color);
            font-weight: 700;
            writing-mode: vertical-rl;
            letter-spacing: 0.15em;
        }

        .scroll-bar-top, .scroll-bar-bottom {
            position: absolute;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, #5c3a1e, #8b5a2b, #a07040, #8b5a2b, #5c3a1e);
            opacity: 0.5;
            z-index: 4;
            pointer-events: none;
        }
        .scroll-bar-top { top: 0; }
        .scroll-bar-bottom { bottom: 0; }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; }
            .editor-panel {
                flex: none;
                width: 100%;
                max-height: none;
                position: relative;
                top: 0;
            }
            .nodes-section { max-height: 400px; }
            .title-input { font-size: 2.2rem; width: 95%; }
            .scroll-content { padding: 35px 25px; }
            .scroll-title { font-size: 2.3rem; }
        }
    </style>
    <!-- 源流明体 (GenRyu Mincho) -->
    <style>
        @font-face {
            font-family: 'GenRyuMin TW';
            src: url('https://font.emtech.cc/fonts/GenRyuMinTW/GenRyuMinTW-Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }
        @font-face {
            font-family: 'GenRyuMin TW';
            src: url('https://font.emtech.cc/fonts/GenRyuMinTW/GenRyuMinTW-Bold.woff2') format('woff2');
            font-weight: 700;
            font-display: swap;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="header">
        <input type="text" class="title-input" id="titleInput" value="XX模拟器" placeholder="在此输入标题..." oninput="updatePreview()">
        <input type="text" class="author-input" id="authorInput" placeholder="在此输入作者..." oninput="updatePreview()">
        <div class="title-hint">&uarr; 点击修改标题与作者</div>
    </div>

    <div class="main-container">
        <div class="editor-panel">
            <div class="panel-section">
                <div class="panel-title">&#9670; 背景图片</div>
                <div class="upload-area" id="uploadArea" onclick="document.getElementById('bgInput').click()">
                    <div class="upload-text">
                        <span class="icon">&#128444;</span>
                        <div>点击上传背景图片</div>
                        <div style="font-size:0.8rem; margin-top:4px; opacity:0.6;">支持 JPG / PNG</div>
                    </div>
                    <img class="upload-preview" id="uploadPreview" alt="背景预览">
                </div>
                <input type="file" id="bgInput" accept="image/*" onchange="handleBgUpload(event)">
            </div>

            <!-- 历史节点：列表滚动 + 按钮固定底部 -->
            <div class="panel-section nodes-section">
                <div class="panel-title">&#9998; 历史节点</div>
                <div class="nodes-list" id="nodesList"></div>
                <button class="add-node-btn" onclick="addNode()">+ 添加情境-选择组合</button>
            </div>

            <div class="panel-section">
                <div class="panel-title">&#9733; 最终结局</div>
                <textarea class="ending-textarea" id="endingInput" placeholder="写下这个故事的最终结局..." oninput="updatePreview()"></textarea>
            </div>

            <!-- 样式面板：减小高度 -->
            <div class="panel-section style-panel">
                <div class="panel-title">&#9874; 样式调整</div>
                
                <div class="style-row">
                    <label>大标题字号</label>
                    <input type="range" min="2" max="6" step="0.1" value="4" oninput="setStyle('--title-size', this.value + 'rem')">
                </div>
                <div class="style-row">
                    <label>大标题颜色</label>
                    <input type="color" value="#f4e4c1" oninput="setStyle('--title-color', this.value)">
                </div>
                
                <div class="style-row">
                    <label>标签字号</label>
                    <input type="range" min="0.5" max="2" step="0.1" value="0.8" oninput="setStyle('--label-size', this.value + 'rem')">
                </div>
                <div class="style-row">
                    <label>标签颜色</label>
                    <input type="color" value="#d4a574" oninput="setStyle('--label-color', this.value)">
                </div>
                
                <div class="style-row">
                    <label>情境字号</label>
                    <input type="range" min="0.8" max="2" step="0.1" value="1.1" oninput="setStyle('--situation-size', this.value + 'rem')">
                </div>
                <div class="style-row">
                    <label>情境颜色</label>
                    <input type="color" value="#f0e6d3" oninput="setStyle('--situation-color', this.value)">
                </div>
                
                <div class="style-row">
                    <label>选择字号</label>
                    <input type="range" min="0.8" max="2" step="0.1" value="1.1" oninput="setStyle('--choice-size', this.value + 'rem')">
                </div>
                <div class="style-row">
                    <label>选择颜色</label>
                    <input type="color" value="#f0e6d3" oninput="setStyle('--choice-color', this.value)">
                </div>
                
                <div class="style-row">
                    <label>结局标题字号</label>
                    <input type="range" min="1" max="3" step="0.1" value="1.8" oninput="setStyle('--ending-label-size', this.value + 'rem')">
                </div>
                <div class="style-row">
                    <label>结局标题颜色</label>
                    <input type="color" value="#d4a574" oninput="setStyle('--ending-label-color', this.value)">
                </div>
                
                <div class="style-row">
                    <label>结局正文字号</label>
                    <input type="range" min="0.8" max="2" step="0.1" value="1.15" oninput="setStyle('--ending-text-size', this.value + 'rem')">
                </div>
                <div class="style-row">
                    <label>结局正文颜色</label>
                    <input type="color" value="#f0e6d3" oninput="setStyle('--ending-text-color', this.value)">
                </div>
                
                <div class="style-row">
                    <label>序号字号</label>
                    <input type="range" min="0.8" max="2" step="0.1" value="1.3" oninput="setStyle('--number-size', this.value + 'rem')">
                </div>
                <div class="style-row">
                    <label>序号颜色</label>
                    <input type="color" value="#d4a574" oninput="setStyle('--number-color', this.value)">
                </div>
                
                <div class="style-row">
                    <label>史书记载字号</label>
                    <input type="range" min="0.8" max="2" step="0.1" value="0.95" oninput="setStyle('--record-size', this.value + 'rem')">
                </div>
                <div class="style-row">
                    <label>史书记载颜色</label>
                    <input type="color" value="#e8dcc8" oninput="setStyle('--record-color', this.value)">
                </div>
                <div class="style-row">
                    <label>印章字号</label>
                    <input type="range" min="0.5" max="2" step="0.1" value="1" oninput="setStyle('--seal-size', this.value + 'rem')">
                </div>
                <div class="style-row">
                    <label>印章颜色</label>
                    <input type="color" value="#b43232" oninput="setStyle('--seal-color', this.value)">
                </div>
            </div>
        </div>

        <div class="preview-section">
            <div class="preview-toolbar">
                <div class="preview-label">&#9670; 长卷预览</div>
                <button class="download-btn" id="downloadBtn" onclick="downloadScroll()">&#128229; 导出图片</button>
            </div>

            <div class="scroll-container" id="scrollContainer">
                <div class="scroll-bg-default" id="defaultBg">
                    <div class="scroll-bg-default-text">暂无背景图 &middot; 请上传图片</div>
                </div>
                <img class="scroll-bg-image" id="scrollBgImage" alt="背景">
                <div class="scroll-overlay" id="scrollOverlay"></div>
                <div class="scroll-bar-top"></div>
                <div class="scroll-bar-bottom"></div>

                <div class="scroll-content" id="scrollContent">
                    <div class="scroll-title" id="scrollTitle">XX模拟器</div>
                    <div class="scroll-author" id="scrollAuthor"></div>
                    <div class="scroll-flow" id="scrollFlow">
                        <div class="scroll-empty">在左侧添加节点，内容将在此展开...</div>
                    </div>
                    <div class="scroll-seal"><span>历史<br>之印</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var nodeIdCounter = 0;
        var currentBgUrl = null;

        window.onload = function() {
            addNode(
                "你出生了，是远在甘肃天水中原边陲的小城，这里是一位叫秦非子的人为周孝王养马得到的封地。",
                "庆幸天子赏识，继续为周国养马。"
            );
        };

        /* ===== 实时修改 CSS 变量 ===== */
        function setStyle(variable, value) {
            document.documentElement.style.setProperty(variable, value);
        }

        function addNode(situation, choice, record) {
            if (typeof situation === 'undefined') situation = '';
            if (typeof choice === 'undefined') choice = '';
            if (typeof record === 'undefined') record = '';

            nodeIdCounter++;
            var list = document.getElementById('nodesList');
            var hasRecord = record && record.trim() !== '';

            var card = document.createElement('div');
            card.className = 'node-card';
            card.id = 'editor-node-' + nodeIdCounter;
            card.innerHTML = 
                '<div class="node-header">' +
                    '<span class="node-badge">节点 ' + nodeIdCounter + '</span>' +
                    '<button class="node-delete" onclick="removeNode(' + nodeIdCounter + ')">删除</button>' +
                '</div>' +
                '<div class="situation-box">' +
                    '<div class="situation-label">当下情境</div>' +
                    '<textarea class="situation-textarea" id="sit-' + nodeIdCounter + '" placeholder="描述当前的历史情境..." oninput="updatePreview()">' + situation + '</textarea>' +
                '</div>' +
                '<div class="choice-box">' +
                    '<div class="choice-label">你的选择</div>' +
                    '<textarea class="choice-textarea" id="choice-' + nodeIdCounter + '" placeholder="描述你做出的选择..." oninput="updatePreview()">' + choice + '</textarea>' +
                '</div>' +
                '<div class="record-toggle-box" id="record-toggle-' + nodeIdCounter + '">' +
                    '<button class="record-toggle-btn' + (hasRecord ? ' active' : '') + '" onclick="toggleRecord(' + nodeIdCounter + ')">' + (hasRecord ? '- 移除史书记载' : '+ 添加史书记载') + '</button>' +
                '</div>' +
                '<div class="record-box" id="record-box-' + nodeIdCounter + '" style="display:' + (hasRecord ? 'block' : 'none') + ';">' +
                    '<div class="record-label">史书记载</div>' +
                    '<textarea class="record-textarea" id="record-' + nodeIdCounter + '" placeholder="引用史书中的相关记载..." oninput="updatePreview()">' + record + '</textarea>' +
                '</div>';

            list.appendChild(card);
            updatePreview();
            setTimeout(function() {
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 50);
        }


        function toggleRecord(id) {
            var box = document.getElementById('record-box-' + id);
            var btn = document.querySelector('#record-toggle-' + id + ' .record-toggle-btn');
            if (!box || !btn) return;

            if (box.style.display === 'none') {
                box.style.display = 'block';
                btn.textContent = '- 移除史书记载';
                btn.classList.add('active');
                setTimeout(function() {
                    var ta = document.getElementById('record-' + id);
                    if (ta) ta.focus();
                }, 50);
            } else {
                box.style.display = 'none';
                btn.textContent = '+ 添加史书记载';
                btn.classList.remove('active');
                var ta = document.getElementById('record-' + id);
                if (ta) {
                    ta.value = '';
                }
            }
            updatePreview();
        }

        function removeNode(id) {
            var card = document.getElementById('editor-node-' + id);
            if (card) {
                card.style.transition = 'all 0.3s ease';
                card.style.opacity = '0';
                card.style.transform = 'translateX(-30px)';
                setTimeout(function() {
                    card.remove();
                    updatePreview();
                }, 300);
            }
        }

        function handleBgUpload(event) {
            var file = event.target.files[0];
            if (!file) return;

            var reader = new FileReader();
            reader.onload = function(e) {
                var base64 = e.target.result;
                currentBgUrl = base64;

                document.getElementById('uploadPreview').src = base64;
                document.getElementById('uploadArea').classList.add('has-image');

                var scrollBg = document.getElementById('scrollBgImage');
                scrollBg.src = base64;
                scrollBg.style.display = 'block';
                document.getElementById('defaultBg').style.display = 'none';

                updatePreview();
            };
            reader.onerror = function() {
                alert('图片读取失败，请换一张试试');
            };
            reader.readAsDataURL(file);
        }

        function updatePreview() {
            var titleInput = document.getElementById('titleInput');
            var title = titleInput ? titleInput.value || 'XX模拟器' : 'XX模拟器';
            document.getElementById('scrollTitle').textContent = title;

            var authorInput = document.getElementById('authorInput');
            var author = authorInput ? authorInput.value.trim() : '';
            var scrollAuthor = document.getElementById('scrollAuthor');
            if (scrollAuthor) {
                scrollAuthor.textContent = author;
                scrollAuthor.style.display = author ? 'block' : 'none';
            }

            var flow = document.getElementById('scrollFlow');
            var cards = document.querySelectorAll('.node-card');
            var endingEl = document.getElementById('endingInput');
            var ending = endingEl ? endingEl.value.trim() : '';

            if (cards.length === 0 && !ending) {
                flow.innerHTML = '<div class="scroll-empty">在左侧添加节点，内容将在此展开...</div>';
                return;
            }

            var html = '';
            var index = 0;
            cards.forEach(function(card) {
                var id = card.id.replace('editor-node-', '');
                var sitEl = document.getElementById('sit-' + id);
                var choiceEl = document.getElementById('choice-' + id);
                var recordEl = document.getElementById('record-' + id);
                var recordBox = document.getElementById('record-box-' + id);
                var sit = sitEl ? sitEl.value.trim() : '';
                var choice = choiceEl ? choiceEl.value.trim() : '';
                var record = recordEl ? recordEl.value.trim() : '';
                var hasRecord = recordBox && recordBox.style.display !== 'none' && record;
                index++;

                if (!sit && !choice && !hasRecord) return;

                html += 
                    '<div class="scroll-node">' +
                        '<div class="scroll-node-header">' +
                            '<div class="scroll-node-number">' + index + '</div>' +
                            '<div class="scroll-node-divider"></div>' +
                        '</div>' +
                        '<div class="scroll-node-card">' +
                            (sit ? '<div class="scroll-situation"><div class="scroll-card-label">当下情境</div>' + escapeHtml(sit) + '</div>' : '') +
                            (choice ? '<div class="scroll-choice"><div class="scroll-card-label">你的选择</div>' + escapeHtml(choice) + '</div>' : '') +
                            (hasRecord ? '<div class="scroll-record"><div class="scroll-card-label">史书记载</div>' + escapeHtml(record) + '</div>' : '') +
                        '</div>' +
                    '</div>';
            });

            if (ending) {
                html += 
                    '<div class="scroll-ending">' +
                        '<div class="scroll-ending-label">最终结局</div>' +
                        '<div class="scroll-ending-text">' + escapeHtml(ending) + '</div>' +
                    '</div>';
            }

            flow.innerHTML = html || '<div class="scroll-empty">在左侧填写内容以预览...</div>';
        }

        function downloadScroll() {
            if (typeof htmlToImage === 'undefined' || !htmlToImage.toPng) {
                alert('导出库加载失败，请刷新页面重试');
                return;
            }

            var container = document.getElementById('scrollContainer');
            var overlay = document.getElementById('scrollOverlay');
            var btn = document.getElementById('downloadBtn');
            var originalText = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = '&#128229; 生成中...';

            function waitForImages(callback) {
                var images = container.querySelectorAll('img');
                var pending = 0;
                var done = false;

                images.forEach(function(img) {
                    if (img.style.display !== 'none' && img.src && !img.complete) {
                        pending++;
                        img.onload = check;
                        img.onerror = check;
                    }
                });

                if (pending === 0) {
                    setTimeout(callback, 300);
                }

                function check() {
                    if (done) return;
                    this.onload = null;
                    this.onerror = null;
                    pending--;
                    if (pending <= 0) {
                        done = true;
                        setTimeout(callback, 300);
                    }
                }
            }

            waitForImages(function() {
                doExport();
            });

            function doExport() {
                var overlayOriginalDisplay = overlay.style.display;
                overlay.style.display = 'none';
                container.classList.add('export-mode');

                var exportTimeout = setTimeout(function() {
                    overlay.style.display = overlayOriginalDisplay;
                    container.classList.remove('export-mode');
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                    alert('导出超时，请重试');
                }, 30000);

                function finalize() {
                    clearTimeout(exportTimeout);
                    overlay.style.display = overlayOriginalDisplay;
                    container.classList.remove('export-mode');
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }

                function extractErrorMessage(err) {
                    if (!err) return '未知错误';
                    if (err instanceof Event) {
                        var info = '资源加载失败';
                        if (err.type) info += ' (类型: ' + err.type + ')';
                        if (err.target && err.target.tagName) info += ' [元素: ' + err.target.tagName + ']';
                        if (err.target && err.target.src) info += ' [地址: ' + err.target.src.slice(0, 80) + '...]';
                        return info;
                    }
                    if (typeof err === 'string') return err;
                    if (err.message && typeof err.message === 'string') return err.message;
                    if (err.toString && err.toString() !== '[object Object]') return err.toString();
                    try { return JSON.stringify(err); } catch(e) { return '不可序列化错误'; }
                }

                function runExport(skipFonts, onSuccess, onError) {
                    htmlToImage.toPng(container, {
                        quality: 1,
                        pixelRatio: 2,
                        skipFonts: skipFonts,
                        cacheBust: true
                    }).then(onSuccess).catch(onError);
                }

                runExport(false, function(dataUrl) {
                    finalize();
                    var link = document.createElement('a');
                    var titleVal = document.getElementById('titleInput').value || 'XX模拟器';
                    link.download = titleVal.replace(/[^\w\u4e00-\u9fa5]/g, '_') + '_长卷.png';
                    link.href = dataUrl;
                    link.click();
                }, function(err) {
                    console.error('首次导出失败:', err);
                    var msg = extractErrorMessage(err);
                    var isFontError = msg.toLowerCase().indexOf('font') !== -1 || err instanceof Event;

                    if (isFontError) {
                        console.log('检测到可能是字体/资源问题，自动重试并跳过字体嵌入...');
                        runExport(true, function(dataUrl) {
                            finalize();
                            var link = document.createElement('a');
                            var titleVal = document.getElementById('titleInput').value || 'XX模拟器';
                            link.download = titleVal.replace(/[^\w\u4e00-\u9fa5]/g, '_') + '_长卷.png';
                            link.href = dataUrl;
                            link.click();
                        }, function(err2) {
                            finalize();
                            console.error('二次导出失败:', err2);
                            alert('导出失败: ' + extractErrorMessage(err2));
                        });
                    } else {
                        finalize();
                        alert('导出失败: ' + msg);
                    }
                });
            }
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }
    </script>
</body>
</html>
